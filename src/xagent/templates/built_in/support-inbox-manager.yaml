id: support-inbox-manager
name: Inbox Manager
category: Support
featured: true
descriptions:
  en: Keeps your inbox triaged so nothing important slips — sorts new mail, drafts replies in your voice, and flags what you should handle yourself.
  zh: 让您的收件箱始终井然有序，不遗漏任何重要邮件——自动分类新邮件，以您的语气起草回复，并标记需要您亲自处理的内容。
features:
  en:
  - Reads and summarizes new and unread email threads with priority labels
  - Drafts replies in your voice — saved to Drafts, never sent without approval
  - Flags sensitive or high-stakes messages for your personal attention
  zh:
  - 读取并摘要新邮件和未读邮件线程，并附优先级标签
  - 以您的语气起草回复——保存为草稿，未经批准不会发送
  - 标记敏感或高风险邮件，提醒您亲自处理
