name: Publish to PyPI

on:
  release:
    types: [published]
  # Manual trigger for re-running the build/publish of an already-tagged ref
  # (e.g. after a transient publish failure). Run it from a release tag: on a
  # non-tag ref hatch-vcs produces a local-version string (X.Y.devN+g<sha>) that
  # PyPI rejects, so the publish step fails without uploading anything.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can derive the version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend static export
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci
          npm run build

      - name: Stage frontend into the package
        run: |
          rm -rf src/xagent/web/frontend_dist
          cp -r frontend/out src/xagent/web/frontend_dist

      - name: Build distribution (wheel only)
        run: |
          python -m pip install build
          # Wheel only: the wheel is a universal py3-none-any build, so pip never
          # needs the sdist to install on any platform. An sdist would also drag
          # in large repo assets (README GIFs, tutorial videos) and exceed PyPI's
          # 100 MB per-file limit for this project.
          python -m build --wheel

      - name: Verify the bundled frontend is in the artifacts
        run: |
          set -e
          python -m zipfile -l dist/*.whl | grep -q "xagent/web/frontend_dist/index.html" \
            || { echo "::error::wheel is missing the bundled frontend (frontend_dist)"; exit 1; }
          echo "Frontend bundle present in wheel."

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
