name: Refresh Migration PRs

on:
  push:
    branches: [main]
    paths:
      - 'src/xagent/migrations/**'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: refresh-migration-prs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh-migration-prs:
    name: Refresh migration PRs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Merge latest main into open migration PRs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BASE_BRANCH: main
          MIGRATION_PREFIX: src/xagent/migrations/
          MIGRATION_VERSIONS_DIR: src/xagent/migrations/versions
          DISPATCH_WORKFLOWS: ci.yml,test-migrations.yml
          STATUS_CONTEXT: migration-refresh/alembic-heads
        run: python .github/scripts/refresh_migration_prs.py
