repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.12.3
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [python, pyi]
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.19.0"
    hooks:
      - id: mypy
        args: ["--package", "xagent"]
        exclude: ^src/xagent/migrations/
        pass_filenames: false
        additional_dependencies:
          - "pydantic[mypy]"
          - aiohttp
          - types-PyYAML
          - types-beautifulsoup4
          - types-requests
          - httpx
          - fastapi
          - uvicorn
          - langchain
          - langchain-core
          - langchain-openai
          - langchain-community
          - numexpr
          # Pin to the project's resolved numpy (uv.lock). Unpinned, the mypy
          # hook env pulls the latest numpy, whose newer stubs use PEP 695
          # `type` syntax that fails under python_version = 3.11 and aborts the
          # whole mypy run before it reaches project code.
          - numpy==1.26.4
          - html2text
          - rich
          - prompt_toolkit
          - langfuse
          - python-dotenv
          - chromadb
          - openpyxl
          - types-openpyxl
          - mcp
          - pandas-stubs
          - matplotlib-stubs
          - docker
          - types-docker
          - playwright
          - nest-asyncio
          - anthropic
          - python-pptx
          - cloudpickle
          - exa-py
          - limits
          # Pin google-auth/google-api-core to versions that ship py.typed;
          # older releases resolved transitively lack the marker and fail
          # import-untyped under disallow_any_unimported.
          - google-auth==2.48.0
          - google-api-core==2.25.2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^docs/|^CLAUDE\.md$
      - id: trailing-whitespace
        exclude: ^CLAUDE\.md$

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [--config, ".codespellrc"]

  - repo: local
    hooks:
      - id: alembic-check
        name: alembic-check
        entry: scripts/check_alembic_heads.sh
        language: script
        pass_filenames: false
        files: ^src/xagent/migrations/versions/

      - id: npm-lint
        name: npm lint
        entry: npm run --prefix frontend lint
        language: system
        pass_filenames: false
        types_or: [javascript, jsx, ts, tsx, json]

      - id: npm-type-check
        name: npm type-check
        entry: npm run --prefix frontend type-check
        language: system
        pass_filenames: false
        types_or: [javascript, jsx, ts, tsx]
        exclude: ^frontend/\.next/
